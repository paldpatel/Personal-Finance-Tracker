<div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">₹</span>
        <h1>FinanceTrack</h1>
      </div>
      <h2>Create account</h2>
      <p class="subtitle">Start tracking your finances</p>
  
      <div class="alert error" *ngIf="error">{{ error }}</div>
  
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="field-row">
          <div class="field">
            <label>First name</label>
            <input type="text" formControlName="firstName" placeholder="Rahul" />
          </div>
          <div class="field">
            <label>Last name</label>
            <input type="text" formControlName="lastName" placeholder="Sharma" />
          </div>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" formControlName="email" placeholder="you@example.com" />
          <span class="field-error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">Enter a valid email</span>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" formControlName="password" placeholder="At least 8 characters" />
          <span class="field-error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">At least 8 characters</span>
        </div>
        <button type="submit" class="btn-primary" [disabled]="loading || form.invalid">
          <span *ngIf="!loading">Create account</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </form>
  
      <p class="auth-link">Already have an account? <a routerLink="/auth/login">Sign in</a></p>
    </div>
  </div>
